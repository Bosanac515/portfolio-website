
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — Aden Muhamedagic</title>
  <link rel="icon" href="../assets/logo-dark.png" type="image/png" />
  <link rel="apple-touch-icon" href="../assets/logo-dark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00B4D8; --cyan2: #0096B7;
      --dark: #0D1B2A; --muted: #6b7280; --border: #e5e7eb;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #2a2a2a; display: flex; flex-direction: column; }

    /* NAV */
    nav {
      background: rgba(255,255,255,0.97); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 5%; height: 66px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { display: flex; align-items: center; text-decoration: none; }
    .nav-brand img { height: 38px; width: auto; object-fit: contain; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-back {
      display: flex; align-items: center; gap: 7px;
      color: var(--muted); text-decoration: none;
      font-size: 0.85rem; font-weight: 500; transition: color 0.2s;
    }
    .nav-back:hover { color: var(--cyan); }
    .btn-download {
      background: var(--cyan); color: white;
      padding: 8px 20px; border-radius: 50px;
      font-weight: 700; font-size: 0.82rem; text-decoration: none;
      display: inline-flex; align-items: center; gap: 7px;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-download:hover { background: var(--cyan2); transform: translateY(-1px); }

    /* PDF VIEWER */
    .pdf-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    iframe {
      flex: 1; width: 100%; border: none; display: block;
      min-height: calc(100vh - 66px);
    }

    /* Mobile fallback */
    .mobile-fallback {
      display: none;
      flex: 1; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; padding: 40px 20px; text-align: center;
    }
    .mobile-fallback p { color: rgba(255,255,255,0.5); font-size: 0.9rem; max-width: 300px; line-height: 1.6; }
    .btn-open {
      background: var(--cyan); color: white;
      padding: 12px 28px; border-radius: 50px;
      font-weight: 700; font-size: 0.9rem; text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
    }

    @media (max-width: 600px) {
      /* On mobile, PDF iframes are unreliable — show open button instead */
      .pdf-wrap iframe { display: none; }
      .mobile-fallback { display: flex; }
      .btn-download .label { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="../" class="nav-brand">
    <img src="../assets/logo-horizontal.png" alt="Aden Muhamedagic" />
  </a>
  <div class="nav-right">
    <a href="../" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Portfolio
    </a>
    <a href="resume.pdf" download class="btn-download">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="label">Download</span>
    </a>
  </div>
</nav>

<div class="pdf-wrap">
  <iframe src="resume.pdf" title="Aden Muhamedagic Resume"></iframe>

  <!-- Shown on mobile where PDF iframes don't work well -->
  <div class="mobile-fallback">
    <p>PDF viewing works best on desktop. Tap below to open it directly.</p>
    <a href="resume.pdf" target="_blank" class="btn-open">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open Resume
    </a>
  </div>
</div>

</body>
</html>
